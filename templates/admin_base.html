<!DOCTYPE html>
<html>

    <title>{% block title %}BetNova Admin{% endblock %}</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    {% block head %}{% endblock %}
</head>

<body>

<div class="admin-header">
    <h2>BetNova Admin</h2>

    <nav>
        <a href="/admin">Dashboard</a> |
        <a href="/admin/matches/add">Add Match</a> |
        <a href="/admin/deposits">Deposits</a> |

    <hr>
</div>

<div class="admin-content">
    {% block content %}
    {% endblock %}

</body>
</html>
