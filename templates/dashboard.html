<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BetNova</title>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

</head>

<header class="topbar">

    <button class="menu-btn">
        <i class="fas fa-bars"></i>
    </button>

    <div class="logo">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="BetNova">
    </div>

    <div class="wallet-box">
        <div class="wallet-balance">
            KSh {{ balance if balance else "0.00" }}
        </div>

        <a href="/deposit" class="deposit-btn">
            Deposit
        </a>
    </div>

</header>

<section class="promo-banner">
    <p>🎁 Welcome Bonus • BetNova Promotions</p>
</section>

<section class="search-area">
    <input
        type="text"
        id="matchSearch"
        placeholder="Search matches..."
    >
</section>
        
<!-- Sports -->
<div class="sports-tabs">
    <button class="active">⚽ Football</button>
    <button>🏀 Basketball</button>
    <button>🎾 Tennis</button>
    <button>🏐 Volleyball</button>
    <button>🏏 Cricket</button>
    <button>🎮 eSports</button>
</div>

<!-- Leagues -->
<div class="league-tabs">
    <button class="active">Premier League</button>
    <button>La Liga</button>
    <button>Serie A</button>
    <button>Bundesliga</button>
    <button>Ligue 1</button>
</div>

<!-- Match Card -->
<div class="match-card">

    <div class="match-header">
        <span>🇬🇧 Premier League</span>
        <span>15:00</span>
    </div>

    <h3>Arsenal vs Chelsea</h3>

    <div class="odds-row">

        <button class="odd">
            <span>1</span>
            <strong>2.15</strong>
        </button>

        <button class="odd">
            <span>X</span>
            <strong>3.40</strong>
        </button>

        <button class="odd">
            <span>2</span>
            <strong>3.10</strong>
        </button>

    </div>

    <button class="markets-btn">
        +85 Markets
    </button>

</div>

</section>


</div>

<nav class="bottom-nav">

    <a href="/dashboard" class="nav-item active">
        <i class="fa-solid fa-house nav-icon"></i>
        <span class="nav-text"
        data-lang="home">Home</span>
    </a>

    <a href="/dashboard" class="nav-item">
        <i class="fa-solid fa-futbol nav-icon"></i>
        <span class="nav-text" 
        data-lang="sports">Sports</span>
    </a>

    <a href="/betslip" class="nav-item betslip-nav">
    <div class="bet-icon-wrapper">
        <i class="fa-solid fa-ticket nav-icon"></i>
        <span id="bet-count" class="bet-badge">0</span>
    </div>

    <span class="nav-text" 
    data-lang="betslip">Bet Slip</span>
</a>


    <a href="/account" class="nav-item">
        <i class="fa-solid fa-user nav-icon"></i>
        <span class="nav-text"
        data-lang="account">Account</span>
    </a>

</nav>

<script src="{{ url_for('static', filename='js/language.js') }}"></script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

</body>
</html>
