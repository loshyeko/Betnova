<!DOCTYPE html>
<html>

<head>

    <title>Bet Slip - BetNova</title>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/betslip.css') }}">

</head>

<body>

<header class="topbar">

    <a href="/dashboard" class="back-btn">
        ← Back
    </a>

    <h2>Bet Slip</h2>

</header>

<div class="betslip-container">

    <div class="betslip-card">

        <h3>Selections</h3>

        <div id="bet-items">

            <p class="empty-slip">
                No selections yet.
            </p>

        </div>

    </div>

    <div class="betslip-card">

        <div class="summary-row">

            <span>Total Odds</span>

            <strong id="total-odds">
                1.00
            </strong>

        </div>

        <div class="stake-section">

            <label>Stake</label>

            <input
                type="number"
                id="stake"
                placeholder="Enter stake">

        </div>

        <div class="summary-row">

            <span>Potential Win</span>

            <strong>

                {{ currency }}

                <span id="potential-win">
                    0.00
                </span>

            </strong>

        </div>

        <div class="summary-row">

            <span>Win Bonus</span>

            <strong>

                {{ currency }}

                <span id="win-bonus">
                    0.00
                </span>

            </strong>

        </div>

        <div class="summary-row payout">

            <span>Payout</span>

            <strong>

                {{ currency }}

                <span id="payout">
                    0.00
                </span>

            </strong>

        </div>

    </div>

</div>

<div class="placebet-footer">

    <button id="place-bet-btn">

        Place Bet

    </button>

</div>

<script>

const currency = "{{ currency }}";

</script>

<script src="{{ url_for('static',
filename='js/script.js') }}"></script>

</body>

</html>
