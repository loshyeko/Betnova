<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetNova Bet Slip</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/betslip.css') }}">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div class="betslip-page">

    <div class="betslip-header">
        <a href="/dashboard">
            <i class="bi bi-arrow-left"></i>
        </a>

        <h2>Bet Slip</h2>

        <span id="selection-count">0</span>
    </div>

    <div id="bet-items">

        <!-- JavaScript will insert selections here -->

    </div>

    <div class="betslip-summary">

        <div class="summary-row">
            <span>Total Odds</span>
            <strong id="total-odds">0.00</strong>
        </div>

        <div class="summary-row">
            <span>Stake ({{ currency }})</span>
            <input
                id="stake"
                type="number"
                placeholder="Enter Stake">
        </div>

        <div class="summary-row">
            <span>Potential Win</span>
            <strong id="potential-win">{{ currency }} 0.00</strong>
        </div>

        <button id="place-bet-btn">
            Place Bet
        </button>

    </div>

</div>

<script src="{{ url_for('static', filename='js/betslip.js') }}"></script>

</body>
</html>
