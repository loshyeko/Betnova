<!DOCTYPE html>
<html>
<head>
    <title>Add Match - BetNova</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<h1>Add Match</h1>

<form method="POST">

<label>Sport</label><br>
<select name="sport">
    <option>Football</option>
    <option>Basketball</option>
    <option>Tennis</option>
    <option>Volleyball</option>
</select>

<br><br>

<label>League</label><br>
<input type="text" name="league" required>

<br><br>

<label>Home Team</label><br>
<input type="text" name="home_team" required>

<br><br>

<label>Away Team</label><br>
<input type="text" name="away_team" required>

<br><br>

<label>Kickoff Date & Time</label><br>
<input type="datetime-local" name="match_time" required>

<br><br>

<h3>Main Odds</h3>

Home Win
<input type="number" step="0.01" name="home_odds">

Draw
<input type="number" step="0.01" name="draw_odds">

Away Win
<input type="number" step="0.01" name="away_odds">

<h3>Double Chance</h3>

<label>1X</label>
<input type="number" step="0.01" name="dc_1x">

<label>X2</label>
<input type="number" step="0.01" name="dc_x2">

<label>12</label>
<input type="number" step="0.01" name="dc_12">

<h3>Both Teams To Score</h3>

<label>Yes</label>
<input type="number" step="0.01" name="btts_yes">

<label>No</label>
<input type="number" step="0.01" name="btts_no">

<h3>Over / Under 2.5</h3>

<label>Over 2.5</label>
<input type="number" step="0.01" name="over_2_5">

<label>Under 2.5</label>
<input type="number" step="0.01" name="under_2_5">
<br><br>

<button type="submit">Publish Match</button>

</form>

</body>
</html>
