<div class="match-card">

    <!-- Time & Date -->
    <div class="match-time">
        <div class="kickoff-time">
            {{ match[4].strftime('%H:%M') }}
        </div>

        <div class="kickoff-date">
            {{ match[4].strftime('%d %b %Y') }}
        </div>
    </div>

    <!-- Game -->
    <div class="match-game">

        <div class="team home-team">
            {{ match[2] }}
        </div>

        <div class="vs">
            VS
        </div>

        <div class="team away-team">
            {{ match[3] }}
        </div>

    </div>

    <!-- League -->
    <div class="match-league">
        {{ match[1] }}
    </div>

    <!-- Odds -->
    <div class="match-odds">

        <button class="odd-btn"
        onclick="addToBet(
            '{{ match[0] }}',
            '{{ match[2] }} vs {{ match[3] }}',
            '1',
            '{{ match[5] }}'
        )">

            <div class="market">
                1
            </div>

            <div class="odd">
                {{ match[5] }}
            </div>

        </button>

        <button class="odd-btn"
        onclick="addToBet(
            '{{ match[0] }}',
            '{{ match[2] }} vs {{ match[3] }}',
            'X',
            '{{ match[6] }}'
        )">

            <div class="market">
                X
            </div>

            <div class="odd">
                {{ match[6] }}
            </div>

        </button>

        <button class="odd-btn"
        onclick="addToBet(
            '{{ match[0] }}',
            '{{ match[2] }} vs {{ match[3] }}',
            '2',
            '{{ match[7] }}'
        )">

            <div class="market">
                2
            </div>

            <div class="odd">
                {{ match[7] }}
            </div>

        </button>

    </div>

</div>
